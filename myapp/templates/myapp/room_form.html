{% extends 'main.html' %}

{% block content %}

<div class="form-page">
    <div class="form-card">
        <div class="form-card__header">
            <h1>Room details</h1>
            <p>Create or update the room information.</p>
        </div>

    <form method="POST" action="" class="app-form">
        {% csrf_token %}
        <p>
            <label for="room_topic">Topic:</label>
            <input required type="text" name="topic" id="room_topic" list="topic-list" value="{% if room.topic %}{{room.topic.name}}{% endif %}">
            <datalist id="topic-list">
                {% for topic in topics %}
                <option value="{{topic.name}}"></option>
                {% endfor %}
            </datalist>
        </p>
        {{form.as_p}}
        <input class="btn btn-primary" type="submit" value="Submit">
    </form>
    </div>
</div>

{% endblock content %}
